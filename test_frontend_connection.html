<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend Connection Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #1a1a2e; color: #fff; }
        .test-result { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #00f5c8; color: #000; }
        .error { background: #ff4b6e; }
        .info { background: #0aafff; }
        button { background: #00f5c8; color: #000; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>
    <h1>🔧 Frontend Connection Test</h1>
    
    <div id="results"></div>
    
    <button onclick="testConnection()">Test Backend Connection</button>
    <button onclick="testLogin()">Test Login</button>
    <button onclick="clearResults()">Clear Results</button>

    <script>
        const API_BASE_URL = 'http://localhost:8001';
        
        function addResult(message, type = 'info') {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `test-result ${type}`;
            div.innerHTML = `<strong>${new Date().toLocaleTimeString()}</strong>: ${message}`;
            results.appendChild(div);
        }
        
        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }
        
        async function testConnection() {
            addResult('Testing backend connection...', 'info');
            
            try {
                const response = await fetch(`${API_BASE_URL}/health`);
                const data = await response.json();
                
                if (response.ok) {
                    addResult(`✅ Backend connected! Status: ${data.status}, Users: ${data.users}, Documents: ${data.documents}`, 'success');
                } else {
                    addResult(`❌ Backend responded with error: ${response.status}`, 'error');
                }
            } catch (error) {
                addResult(`❌ Connection failed: ${error.message}`, 'error');
                console.error('Connection error:', error);
            }
        }
        
        async function testLogin() {
            addResult('Testing login...', 'info');
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: 'user@example.com',
                        password: 'password'
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    addResult(`✅ Login successful! User: ${data.user.full_name}`, 'success');
                    addResult(`Token: ${data.access_token.substring(0, 50)}...`, 'info');
                } else {
                    const errorText = await response.text();
                    addResult(`❌ Login failed: ${response.status} - ${errorText}`, 'error');
                }
            } catch (error) {
                addResult(`❌ Login request failed: ${error.message}`, 'error');
                console.error('Login error:', error);
            }
        }
        
        // Auto-test on page load
        window.addEventListener('load', () => {
            addResult('Page loaded. Click buttons to test connection.', 'info');
        });
    </script>
</body>
</html>
